# @package _global_
# =============================================================================
# Continual Learning — Titans MAC (Memory as a Context)
# =============================================================================
# CL experiment using the Titans architecture with Neural Memory Module.
# The model performs test-time training via surprise-gated momentum updates
# to its NMM weights, providing an implicit form of continual adaptation.
#
# Pipeline: Base Training → Finetune Task 1 → Eval → Finetune Task 2 → Eval → ...
#
# Usage:
#   uv run src/cl_train.py experiment=cl_titans paths.data_dir=/path/to/clips
#
# Architecture: MAC-Titan (~43M params, param-matched with AC-ViT)
#   - Conv Encoder + Action tiling → hidden_dim tokens
#   - Stacked MACTitanLayers (attention + NMM + persistent memory)
#   - Conv Decoder with residual prediction
#   - Inner-loop NMM updates at every forward step (surprise-gated momentum)
#
# Task training: Naive fine-tuning (gradient descent on task clips)
# =============================================================================

defaults:
  - override /data: precomputed_features
  - override /model: titans
  - override /trainer: default
  - override /callbacks: default
  - override /logger: wandb

# =============================================================================
# EXPERIMENT METADATA
# =============================================================================
task_name: "cl_titans"
tags: ["cl", "continual_learning", "titans", "mac", "nmm", "ttt"]
seed: 42
train: True
test: False

# =============================================================================
# DATA DEFAULTS (overridden per phase by cl_train.py)
# =============================================================================
data:
  batch_size: 16
  num_workers: 4
  pin_memory: true

# =============================================================================
# MODEL: Titans MAC
# =============================================================================
model:
  T_teacher: 7
  jump_k: 3
  use_iteration_scheduler: true
  action_dim: 2

  # Titans architecture (param-matched: ~43M params, comparable to AC-ViT)
  hidden_dim: 768
  pm_len: 4
  n_layers: 4
  n_layers_nmm: 2
  alpha: 0.999
  eta: 0.8
  theta: 0.3

  # Loss
  loss_weight_teacher: 1.0
  loss_weight_jump: 1.0
  loss_type: "l1"

  # Curriculum for base training (effectively no curriculum — weights fixed)
  curriculum_schedule:
    - epoch: 0
      loss_weight_teacher: 1.0
    - epoch: 7
      loss_weight_teacher: 1.0
    - epoch: 11
      loss_weight_teacher: 1.0

  # Optimizer (matching lower-bound / AC-ViT settings)
  learning_rate: 4.25e-4
  weight_decay: 0.04
  betas: [0.9, 0.999]

  # LR schedule (iteration-based)
  warmup_pct: 0.085
  constant_pct: 0.83
  decay_pct: 0.085
  warmup_start_lr: 7.5e-5

# =============================================================================
# TRAINER DEFAULTS (overridden per phase by cl_train.py)
# =============================================================================
trainer:
  max_epochs: 40
  gradient_clip_val: 1.01
  gradient_clip_algorithm: norm
  precision: 32

# =============================================================================
# CONTINUAL LEARNING PIPELINE CONFIGURATION
# =============================================================================
cl:
  wandb_group: "cl_titans_${now:%Y%m%d_%H%M%S}"

  # Sequential pipeline with naive finetune
  pipeline_mode: "sequential"
  task_training_mode: "finetune"

  # Resume: set to a checkpoint path to skip base training
  # e.g.  cl.resume_from_base_checkpoint=/path/to/base_training_final.ckpt
  resume_from_base_checkpoint: null

  # --- Base Training Phase ---
  base_training:
    clip_start: 0
    clip_end: 5000
    max_epochs: 40
    val_split: 0.1

  # --- Sequential Tasks ---
  tasks:
    - name: "scaling_shift"
      clip_start: 5000
      clip_end: 6000
    - name: "dissipation_shift"
      clip_start: 6000
      clip_end: 7000
    - name: "discretization_shift"
      clip_start: 7000
      clip_end: 8000
    - name: "kinematics_shift"
      clip_start: 8000
      clip_end: 9000
    - name: "compositional_ood"
      clip_start: 9000
      clip_end: 10000

  # --- Evaluation ---
  eval:
    clips_per_task: 100

  # --- Task Training: Naive Finetuning ---
  task_training:
    max_epochs: 10
    val_split: 0.0
