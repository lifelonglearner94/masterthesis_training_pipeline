# @package _global_
# =============================================================================
# Continual Learning — RetNet
# =============================================================================
# CL experiment using the Retentive Network architecture with multi-scale
# retention and chunkwise-recurrent computation.
#
# Pipeline: Base Training → Finetune Task 1 → Eval → Finetune Task 2 → Eval → ...
#
# Usage:
#   uv run src/cl_train.py experiment=cl_retnet paths.data_dir=/path/to/clips
#
# Architecture: RetNet (~43M params, param-matched with AC-ViT)
#   - Conv Encoder + Action tiling → embed_dim tokens
#   - Stacked RetNetDecoderLayers (MultiScaleRetention + GatedLinearUnit)
#   - Conv Decoder with residual prediction
#
# Task training: Naive fine-tuning (gradient descent on task clips)
# =============================================================================

defaults:
  - override /data_settings@data: precomputed_features
  - override /model: retnet
  - override /trainer: default
  - override /callbacks: default
  - override /logger: wandb

# =============================================================================
# EXPERIMENT METADATA
# =============================================================================
task_name: "cl_retnet"
tags: ["cl", "continual_learning", "retnet", "retention", "linear_recurrence"]
seed: 42
train: True
test: False

# =============================================================================
# DATA DEFAULTS (overridden per phase by cl_train.py)
# =============================================================================
data:
  batch_size: 16
  num_workers: 4
  pin_memory: true

# =============================================================================
# MODEL: RetNet
# =============================================================================
model:
  T_teacher: 7
  jump_k: 3
  use_iteration_scheduler: true
  action_dim: 2

  # RetNet architecture (param-matched: ~43M params)
  embed_dim: 768
  value_dim: 1280
  n_layers: 6
  n_heads: 4
  ffn_dim: 1280
  recurrent_chunk_size: 64
  chunkwise_recurrent: true

  # Loss
  loss_weight_teacher: 1.0
  loss_weight_jump: 1.0
  loss_type: "l1"

  # Curriculum for base training
  curriculum_schedule:
    - epoch: 0
      loss_weight_teacher: 1.0
    - epoch: 7
      loss_weight_teacher: 1.0
    - epoch: 11
      loss_weight_teacher: 1.0

  # Optimizer (matching lower-bound / AC-ViT settings)
  learning_rate: 4.25e-4
  weight_decay: 0.04
  betas: [0.9, 0.999]

  # LR schedule (iteration-based)
  warmup_pct: 0.085
  constant_pct: 0.83
  decay_pct: 0.085
  warmup_start_lr: 7.5e-5

# =============================================================================
# TRAINER DEFAULTS (overridden per phase by cl_train.py)
# =============================================================================
trainer:
  max_epochs: 40
  gradient_clip_val: 1.01
  gradient_clip_algorithm: norm
  precision: 32

# =============================================================================
# CONTINUAL LEARNING PIPELINE CONFIGURATION
# =============================================================================
cl:
  wandb_group: "cl_retnet_${now:%Y%m%d_%H%M%S}"

  # Sequential pipeline with naive finetune
  pipeline_mode: "sequential"
  task_training_mode: "finetune"

  # Resume: set to a checkpoint path to skip base training
  resume_from_base_checkpoint: null

  # --- Base Training Phase ---
  base_training:
    clip_start: 0
    clip_end: 5000
    max_epochs: 40
    val_split: 0.1

  # --- Sequential Tasks ---
  tasks:
    - name: "scaling_shift"
      clip_start: 5000
      clip_end: 6000
    - name: "dissipation_shift"
      clip_start: 6000
      clip_end: 7000
    - name: "discretization_shift"
      clip_start: 7000
      clip_end: 8000
    - name: "kinematics_shift"
      clip_start: 8000
      clip_end: 9000
    - name: "compositional_ood"
      clip_start: 9000
      clip_end: 10000

  # --- Evaluation ---
  eval:
    clips_per_task: 100

  # --- Task Training: Naive Finetuning ---
  task_training:
    max_epochs: 10
    val_split: 0.0
