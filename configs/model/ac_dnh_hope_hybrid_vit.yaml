# @package _global_

# AC-DNH-HOPE-Hybrid-ViT Model Configuration (Phase 11)
# Action-Conditioned DNH-HOPE Hybrid Vision Transformer
#
# Dynamic Nested Hierarchy (Jafari 2025) applied to the Phase 8 Hybrid:
#   - ACRoPEAttention retained (unchanged from Phase 8)
#   - DynamicNestedHierarchy replaces single Titan M_memory (2–5 SMM levels)
#   - DynamicCMS replaces static CMS (3–5 frequency levels)
#   - Structural evolution: level add/prune + LSS frequency modulation
#
# Key changes from Phase 8:
#   - Phase B: Single TitanMemory → DynamicNestedHierarchy with meta-networks
#   - Phase C: Static CMS → DynamicCMS with add/prune capability
#   - 5 optimizer groups (attention, dnh_memory, dnh_controller, cms, projections)
#   - Meta-loss drives structural evolution decisions
#   - ~60M param budget (larger than Phase 8's 44M due to meta-networks)
#
# Same input/output format as all AC predictor variants:
#   Input:  [B, T*N, D=1024] + [B, T, action_dim]
#   Output: [B, T*N, D=1024]

defaults:
  - /model/_empty  # Override empty default

model:
  _target_: src.models.hope.ACDNHHOPEHybridModule

  # ─── Model architecture (Stage 1 & 3 — identical to AC predictor) ───
  img_size: [256, 256]
  patch_size: 16
  num_timesteps: 8
  embed_dim: 1024
  predictor_embed_dim: 384
  depth: 12
  num_heads: 16
  action_embed_dim: 7
  is_frame_causal: true
  use_activation_checkpointing: false
  use_extrinsics: false

  # ─── Attention settings (Phase A — unchanged from Phase 8) ───
  qkv_bias: true
  attn_drop_rate: 0.0

  # ─── DNH settings (Phase B — Dynamic Nested Hierarchy) ───
  dnh_L_init: 2                   # Start with 2 SMM levels per block
  dnh_L_max: 5                    # Max 5 levels per block
  dnh_L_min: 2                    # Min 2 levels (always keep at least 2)

  # Titan Memory (inside each SMM level)
  titan_hidden_multiplier: 2
  titan_layers: 2
  titan_activation: "gelu"
  titan_grad_clip_inner: 1.0
  titan_grad_clip_backward: 1.0
  titan_detach_interval: 2
  surprise_threshold: 0.1

  # SMM meta-network (g_ψ)
  meta_hidden_dim: null           # null = dim (384)

  # ─── CMS settings (Phase C — Dynamic CMS) ───
  cms_level_specs:
    - name: "fast"
      update_period: 1
      hidden_multiplier: 2.0
      warmup_steps: 0
    - name: "medium"
      update_period: 3
      hidden_multiplier: 2.5
      warmup_steps: 0
    - name: "slow"
      update_period: 7
      hidden_multiplier: 3.0
      warmup_steps: 0
  cms_use_chunk_scheduling: false
  cms_L_max: 5                    # Max CMS frequency levels
  cms_L_min: 2                    # Min CMS frequency levels

  # ─── Longterm Memory (optional, for CL) ───
  use_longterm_memory: false
  longterm_hidden_multiplier: 2
  longterm_lr_scale: 0.1

  # ─── Structural Evolution ───
  dnh_tau_add: 0.5                # Meta-loss threshold for level addition
  dnh_epsilon_prune: 0.01         # Grad norm threshold for level pruning
  dnh_gamma_freq: 0.1             # Frequency modulation coefficient (from paper)
  dnh_eta_freq: 0.01              # Frequency update learning rate
  dnh_beta_momentum: 0.9          # Frequency modulation momentum
  dnh_evolution_interval: 50      # Check evolution every N steps
  dnh_evolution_warmup: 200       # Skip evolution for first N steps
  dnh_enable_addition: true       # Enable level addition
  dnh_enable_pruning: true        # Enable level pruning
  dnh_enable_freq_modulation: true # Enable frequency modulation

  # ─── Meta-loss weights ───
  dnh_meta_lambda: 0.01           # Structural change penalty weight
  dnh_meta_mu: 0.001              # Representation drift penalty weight

  # ─── Diagnostics ───
  log_hope_diagnostics: true
  diagnostics_log_interval: 50

  # ─── Regularization ───
  drop_rate: 0.0
  drop_path_rate: 0.1

  # ─── Loss settings ───
  T_teacher: 7
  jump_k: 3
  loss_weight_teacher: 1.0
  loss_weight_jump: 1.0
  normalize_reps: true
  loss_type: "l1"
  huber_delta: 1.0

  # ─── Curriculum learning ───
  curriculum_schedule: null

  # ─── Optimizer settings ───
  learning_rate: 3e-4             # From DNH paper: 3×10⁻⁴
  weight_decay: 0.04
  betas: [0.9, 0.999]
  warmup_epochs: 10
  max_epochs: ${trainer.max_epochs}
  optimizer_type: "adamw"

  # Per-group LR scaling (5 groups)
  attention_lr_scale: 1.0         # Attention LR = 3e-4 (match ViT baseline)
  dnh_memory_lr_scale: 0.1        # SMM memory LR = 3e-5 (slow, inner-loop role)
  dnh_controller_lr_scale: 0.05   # Frequency params LR = 1.5e-5 (very slow)
  cms_lr_scale: 0.6               # CMS LR = 1.8e-4
  projections_lr_scale: 1.0       # Encoder/decoder LR = 3e-4
  titan_weight_decay: 0.005       # Separate WD for memory params
  dnh_controller_weight_decay: 0.0 # No WD for frequency params
  aux_loss_weight: 0.0            # Not needed

  # LR schedule
  use_iteration_scheduler: false
  warmup_pct: 0.10
  constant_pct: 0.80
  decay_pct: 0.10
  warmup_start_lr: 7.5e-5

  # TTA defaults
  tta_enabled: false
