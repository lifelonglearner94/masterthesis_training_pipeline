# @package _global_

# Benchmark Classification Wrapper — AC-DNH-HOPE-Hybrid-ViT (Phase 11) Backbone
# Attention + DNH Memory Hierarchy + Dynamic CMS adapted for image classification.
#
# Usage:
#   uv run src/cl_benchmark_train.py experiment=cl_split_cifar100 model=benchmark_dnh
#   uv run src/cl_benchmark_train.py experiment=cl_permuted_mnist model=benchmark_dnh

defaults:
  - /model/_empty

model:
  _target_: src.models.benchmark_classifier.BackboneClassifierModule

  # -- Patch Embedding & Image --
  in_channels: 3
  img_size: 32
  patch_size: 4
  embed_dim: 384                   # Must match backbone's embed_dim

  # -- Classification --
  num_classes: 100
  action_dim: 1

  # -- Optimizer (paper: AdamW, lr=3e-4) --
  learning_rate: 3e-4
  weight_decay: 1e-4
  betas: [0.9, 0.999]
  warmup_epochs: 5
  max_epochs: 100

  # -- AC-DNH-HOPE-Hybrid-ViT Backbone (Phase 11) --
  backbone:
    _target_: src.models.hope.ACDNHHOPEHybridViT
    img_size: [32, 32]             # 32/4 = 8×8 = 64 patches per frame
    patch_size: 4
    num_timesteps: 1               # Single image = 1 timestep
    embed_dim: 384                 # Input dim from PatchEmbedding
    predictor_embed_dim: 192       # Internal predictor dim
    depth: 8                       # 8 DNH hybrid blocks (scaled for benchmark)
    num_heads: 6
    action_embed_dim: 1            # Dummy action (zeroed out)
    is_frame_causal: false         # No causality needed for single-image classification
    use_activation_checkpointing: false
    use_extrinsics: false
    qkv_bias: true
    attn_drop_rate: 0.0
    # DNH settings
    dnh_L_init: 2                  # Start with 2 SMM levels per block
    dnh_L_max: 4                   # Up to 4 levels
    dnh_L_min: 2                   # Never fewer than 2
    # Titan memory
    titan_hidden_multiplier: 1
    titan_layers: 2
    titan_activation: gelu
    titan_grad_clip_inner: 1.0
    titan_grad_clip_backward: 1.0
    titan_detach_interval: 2
    surprise_threshold: 0.1
    meta_hidden_dim: 96            # Compact meta-network
    # CMS
    cms_use_chunk_scheduling: true
    cms_level_specs:
      - name: "fast"
        update_period: 1
        hidden_multiplier: 1.5
        warmup_steps: 0
      - name: "medium"
        update_period: 3
        hidden_multiplier: 2.0
        warmup_steps: 0
      - name: "slow"
        update_period: 7
        hidden_multiplier: 2.5
        warmup_steps: 0
    cms_L_max: 5
    cms_L_min: 2
    # Longterm memory (enables CL adaptation)
    use_longterm_memory: true
    longterm_hidden_multiplier: 1
    longterm_lr_scale: 0.1
    # Regularization
    drop_rate: 0.0
    drop_path_rate: 0.1
    log_hope_diagnostics: false
