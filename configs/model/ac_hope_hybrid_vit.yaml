# @package _global_

# AC-HOPE-Hybrid-ViT Model Configuration (Phase 8)
# Action-Conditioned HOPE Hybrid Vision Transformer
#
# Combines ViT baseline's self-attention with HOPE's Titan memory:
#   - ACRoPEAttention retained (full token interaction with 3D RoPE)
#   - Single Titan M_memory per block (in-context DGD adaptation)
#   - CMS multi-frequency MLPs (feature transformation)
#
# Key improvement over original HOPE:
#   - Attention is AUGMENTED with Titan (not replaced)
#   - Only 1 Titan memory per block (not 5) — K/V from Linear projections
#   - η/α are learned nn.Parameters (not full Titan memories)
#   - No aux_loss needed (K/V projections get direct outer-loop gradients)
#   - depth=12 (compromise between 5 and 24)
#
# Same input/output format as ac_predictor.yaml and ac_hope_vit.yaml:
#   Input:  [B, T*N, D=1024] + [B, T, action_dim]
#   Output: [B, T*N, D=1024]

defaults:
  - /model/_empty  # Override empty default

model:
  _target_: src.models.hope.ACHOPEHybridModule

  # ─── Model architecture (Stage 1 & 3 — identical to AC predictor) ───
  img_size: [256, 256]
  patch_size: 16
  num_timesteps: 8
  embed_dim: 1024
  predictor_embed_dim: 384
  depth: 12
  num_heads: 16
  action_embed_dim: 7   # 7D: position (3), orientation (3), gripper (1)
  is_frame_causal: true
  use_activation_checkpointing: false
  use_extrinsics: false

  # ─── Attention settings ───
  qkv_bias: true
  attn_drop_rate: 0.0

  # ─── Titan Memory (Phase B — single M_memory per block) ───
  titan_hidden_multiplier: 2      # Titan MLP hidden dim = dim * multiplier
  titan_layers: 2                 # Layers in Titan MLP
  titan_activation: "gelu"
  titan_grad_clip_inner: 1.0      # Gradient clipping for inner-loop (DGD)
  titan_grad_clip_backward: 1.0   # Gradient clipping for backward pass
  titan_detach_interval: 0        # Detach graph every N steps (0 = never)
  surprise_threshold: 0.0         # Min surprise to trigger update (0 = always)

  # ─── CMS multi-frequency MLPs (Phase C) ───
  cms_level_specs:
    - name: "fast"
      update_period: 1
      hidden_multiplier: 2.0
      warmup_steps: 0
    - name: "medium"
      update_period: 3
      hidden_multiplier: 2.5
      warmup_steps: 0
    - name: "slow"
      update_period: 7
      hidden_multiplier: 3.0
      warmup_steps: 0
  cms_use_chunk_scheduling: false

  # ─── Longterm Memory (optional, for CL) ───
  use_longterm_memory: false
  longterm_hidden_multiplier: 2
  longterm_lr_scale: 0.1

  # ─── Diagnostics ───
  log_hope_diagnostics: true
  diagnostics_log_interval: 50

  # ─── Regularization ───
  drop_rate: 0.0
  drop_path_rate: 0.1

  # ─── Loss settings (identical to AC predictor for comparability) ───
  T_teacher: 7
  jump_k: 3
  loss_weight_teacher: 1.0
  loss_weight_jump: 1.0
  normalize_reps: true
  loss_type: "l1"
  huber_delta: 1.0

  # ─── Curriculum learning (null = disabled) ───
  curriculum_schedule: null

  # ─── Optimizer settings ───
  learning_rate: 1e-4
  weight_decay: 0.05
  betas: [0.9, 0.999]
  warmup_epochs: 10
  max_epochs: ${trainer.max_epochs}
  optimizer_type: "adamw"

  # Per-group LR scaling
  titan_lr_scale: 0.3             # Titan params LR = learning_rate * 0.3
  cms_lr_scale: 1.0               # CMS params LR = learning_rate * 1.0
  titan_weight_decay: 0.005       # Separate WD for Titan
  aux_loss_weight: 0.0            # Not needed for hybrid (K/V have direct gradients)

  # LR schedule
  use_iteration_scheduler: false
  warmup_pct: 0.085
  constant_pct: 0.83
  decay_pct: 0.085
  warmup_start_lr: 7.5e-5

  # TTA defaults
  tta_enabled: false
