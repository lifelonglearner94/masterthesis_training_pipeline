# @package _global_

# Benchmark Classification Wrapper — AC-HOPE-ViT (Vanilla, Phase 6) Backbone
# Pure Titan Memory + CMS (no attention sublayer) adapted for image classification.
# This is the original HOPE architecture where Titan replaces attention entirely.
#
# Usage:
#   uv run src/cl_benchmark_train.py experiment=cl_split_cifar100 model=benchmark_hope
#   uv run src/cl_benchmark_train.py experiment=cl_permuted_mnist model=benchmark_hope

defaults:
  - /model/_empty

model:
  _target_: src.models.benchmark_classifier.BackboneClassifierModule

  # -- Patch Embedding & Image --
  in_channels: 3
  img_size: 32
  patch_size: 4
  embed_dim: 384                   # Must match backbone's embed_dim

  # -- Classification --
  num_classes: 100
  action_dim: 1

  # -- Optimizer (paper: AdamW, lr=3e-4) --
  learning_rate: 3e-4
  weight_decay: 1e-4
  betas: [0.9, 0.999]
  warmup_epochs: 5
  max_epochs: 100

  # -- AC-HOPE-ViT Backbone (Vanilla / Phase 6) --
  # Pure Titan Memory + CMS blocks — NO attention sublayer.
  # Titan replaces attention, CMS replaces FFN. (~9.26M backbone params)
  backbone:
    _target_: src.models.hope.ACHOPEViT
    img_size: [32, 32]             # 32/4 = 8×8 = 64 patches per frame
    patch_size: 4
    num_timesteps: 1               # Single image = 1 timestep
    embed_dim: 384                 # Input dim from PatchEmbedding
    predictor_embed_dim: 192       # Internal predictor dim
    depth: 6                       # 6 HOPE blocks (~9.26M params, matching hybrid's ~9.3M)
    num_heads: 6
    action_embed_dim: 1            # Dummy action (zeroed out)
    is_frame_causal: false         # No causality needed for single-image classification
    use_activation_checkpointing: false
    use_extrinsics: false
    use_rope: false                # No RoPE for single-image classification
    # Titan memory (replaces attention entirely)
    titan_hidden_multiplier: 2
    titan_layers: 2
    titan_activation: gelu
    titan_grad_clip_inner: 1.0
    titan_grad_clip_backward: 1.0
    titan_detach_interval: 2
    surprise_threshold: 0.1
    chunk_size: 0
    # Longterm memory (enables CL adaptation — key Phase 6 feature)
    use_longterm_memory: true
    longterm_hidden_multiplier: 2
    longterm_lr_scale: 0.1
    # CMS — multi-frequency MLPs (replaces FFN entirely)
    cms_use_chunk_scheduling: true
    cms_level_specs:
      - name: "fast"
        update_period: 1
        hidden_multiplier: 2.0
        warmup_steps: 0
      - name: "medium"
        update_period: 3
        hidden_multiplier: 2.5
        warmup_steps: 0
      - name: "slow"
        update_period: 7
        hidden_multiplier: 3.0
        warmup_steps: 0
    # Spatial mixing disabled (vanilla HOPE processes tokens independently)
    use_spatial_mixing: false
    # Regularization
    drop_rate: 0.0
    drop_path_rate: 0.1
    log_hope_diagnostics: false
