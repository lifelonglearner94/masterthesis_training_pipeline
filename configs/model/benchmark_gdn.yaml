# @package _global_

# Benchmark Classification Wrapper — GatedDeltaNet Backbone
# Recurrent linear attention with gated delta rule (Yang et al., 2024).
# Parameter-matched to benchmark_hybrid (~9.3M backbone params).
#
# Reference: Yang et al., "Gated Delta Networks: Improving Mamba2 with Delta Rule", 2024
#
# Usage:
#   uv run src/cl_benchmark_train.py experiment=cl_split_cifar100 model=benchmark_gdn
#   uv run src/cl_benchmark_train.py experiment=cl_permuted_mnist model=benchmark_gdn

defaults:
  - /model/_empty

model:
  _target_: src.models.benchmark_classifier.BackboneClassifierModule

  # -- Patch Embedding & Image --
  in_channels: 3
  img_size: 32
  patch_size: 4
  embed_dim: 384                   # PatchEmbed output dim = backbone input_dim

  # -- Classification --
  num_classes: 100
  action_dim: 1

  # -- Optimizer (paper: AdamW, lr=3e-4) --
  learning_rate: 3e-4
  weight_decay: 1e-4
  betas: [0.9, 0.999]
  warmup_epochs: 5
  max_epochs: 100

  # -- GatedDeltaNet Backbone (~9.30M params) --
  backbone:
    _target_: src.models.gated_delta_net.GatedDeltaNetBackbone
    input_dim: 384                 # Must match embed_dim
    hidden_dim: 288                # Tuned for ~9.3M param budget
    action_dim: 1                  # Dummy action (zeroed out)
    spatial_size: 8                # 32/4 = 8×8 = 64 patches
    n_layers: 6                    # 6 GDN blocks
    num_heads: 4                   # Multi-head delta rule
    expand_k: 0.75                 # Key expansion ratio
    expand_v: 1.5                  # Value expansion ratio
    intermediate_size: 1152        # SwiGLU FFN hidden (4× hidden_dim)
    conv_size: 4                   # Short conv kernel
    num_timesteps: 1               # Single image = 1 timestep
