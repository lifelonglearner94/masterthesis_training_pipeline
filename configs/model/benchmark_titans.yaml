# Benchmark Classification Wrapper — Titans MAC Backbone
# Usage: uv run src/cl_benchmark_train.py experiment=cl_split_cifar100 model=benchmark_titans

defaults:
  - /model/_empty

model:
  _target_: src.models.benchmark_classifier.BackboneClassifierModule

  # -- Patch Embedding & Image --
  in_channels: 3            # 3=RGB (CIFAR-100), overridden to 1 for MNIST
  img_size: 32
  patch_size: 4             # 32/4 = 8 → 64 patches
  embed_dim: 384            # Patch embedding output dim = backbone input_dim

  # -- Classification --
  num_classes: 100           # Overridden per dataset
  action_dim: 1              # Dummy (zero actions)

  # -- Optimizer --
  learning_rate: 3e-4
  weight_decay: 1e-4
  betas: [0.9, 0.999]
  warmup_epochs: 5
  max_epochs: 100

  # -- Titans Backbone (Hydra recursive instantiation) --
  backbone:
    _target_: src.models.titans.TitansBackbone
    input_dim: 384
    hidden_dim: 256
    action_dim: 1
    spatial_size: 8          # sqrt(num_patches) = sqrt(64)
    pm_len: 4
    n_layers: 3
    n_layers_nmm: 2
    alpha: 0.999
    eta: 0.8
    theta: 0.3
    num_timesteps: 1
