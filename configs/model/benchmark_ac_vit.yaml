# @package _global_

# Benchmark Classification Wrapper — AC-ViT (Vision Transformer Predictor) Backbone
# Usage: uv run src/cl_benchmark_train.py experiment=cl_split_cifar100 model=benchmark_ac_vit

defaults:
  - /model/_empty

model:
  _target_: src.models.benchmark_classifier.BackboneClassifierModule

  # -- Patch Embedding & Image --
  in_channels: 3
  img_size: 32
  patch_size: 4
  embed_dim: 384

  # -- Classification --
  num_classes: 100
  action_dim: 1

  # -- Optimizer (paper: AdamW, lr=3e-4) --
  learning_rate: 3e-4
  weight_decay: 1e-4
  betas: [0.9, 0.999]
  warmup_epochs: 5
  max_epochs: 100

  # -- AC-ViT Backbone (factory function) --
  backbone:
    _target_: src.models.ac_predictor.vit_ac_predictor
    img_size: [32, 32]           # Grid = 32/4 = 8×8 = 64 patches
    patch_size: 4
    num_timesteps: 1
    embed_dim: 384               # Must match wrapper embed_dim
    predictor_embed_dim: 192
    depth: 6
    num_heads: 6
    mlp_ratio: 4.0
    qkv_bias: true
    drop_rate: 0.0
    attn_drop_rate: 0.0
    drop_path_rate: 0.0
    is_frame_causal: true
    use_rope: true
    action_embed_dim: 1          # Tiny dummy action embedding
    use_extrinsics: false
    use_activation_checkpointing: false
